<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Coach App" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; color:#222; }
    header, nav { margin-bottom: 16px; }
    a.button, button, input[type="submit"] {
      background:#1f6feb; color:#fff; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; text-decoration:none;
    }
    a.button.secondary, button.secondary, input.secondary { background:#6c757d; }
    a.button.danger, button.danger, input.danger { background:#dc3545; }
    a { color:#1f6feb; text-decoration:none; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#f8f9fa; text-align:left; }
    form.inline { display:inline; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    .card { border:1px solid #eee; padding:12px; border-radius:8px; margin:8px 0; }
    .muted { color:#666; }
    input[type="number"] { width: 100px; }
    input[type="date"] { padding:6px; }
    input[type="text"] { padding:6px; }
    .total { font-weight:600; }
  </style>
</head>
<body>
<header>
  <h1>{{ title or "Coach App" }}</h1>
  {% if back_href %}
    <a class="button secondary" href="{{ back_href }}">← Volver</a>
  {% endif %}
</header>

{% block content %}{% endblock %}
</body>
</html>
