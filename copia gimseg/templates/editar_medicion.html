<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar medición</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg,#0f172a,#1e293b);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade { animation: fadeIn .35s ease-out; }
  </style>
</head>

<body class="p-6 text-white font-sans flex items-center justify-center min-h-screen">

  <div class="fade bg-slate-800/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-lg">

    <h1 class="text-3xl font-bold mb-6 text-center">✏️ Editar medición</h1>

    <!-- FORMULARIO DE EDICIÓN -->
    <form action="/seguimiento/editar" method="post">

      <!-- IDs ocultos -->
      <input type="hidden" name="user_id" value="{{ user_id }}">
      <input type="hidden" name="fecha_original" value="{{ medicion.fecha }}">

      <!-- Fecha -->
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-1">Fecha</label>
        <input
          type="date"
          name="fecha"
          value="{{ medicion.fecha }}"
          required
          class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white"
        >
      </div>

      <!-- Peso -->
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-1">Peso (kg)</label>
        <input
          type="number"
          step="0.1"
          name="peso"
          value="{{ medicion.peso }}"
          required
          class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white"
        >
      </div>

      <!-- Medidas -->
      <div class="grid grid-cols-2 gap-4">

        <div>
          <label class="block text-sm font-semibold mb-1">Pecho (cm)</label>
          <input type="number" step="0.1" name="pecho" value="{{ medicion.pecho }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Cintura (cm)</label>
          <input type="number" step="0.1" name="cintura" value="{{ medicion.cintura }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Abdomen (cm)</label>
          <input type="number" step="0.1" name="abdomen" value="{{ medicion.abdomen }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Cadera (cm)</label>
          <input type="number" step="0.1" name="cadera" value="{{ medicion.cadera }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Brazo (cm)</label>
          <input type="number" step="0.1" name="brazo" value="{{ medicion.brazo }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1">Pierna (cm)</label>
          <input type="number" step="0.1" name="pierna" value="{{ medicion.pierna }}"
                 class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
        </div>

      </div>

      <!-- Botón Guardar -->
      <button
        class="w-full bg-green-600 hover:bg-green-700 py-3 mt-6 rounded-xl font-semibold transition active:scale-95 shadow-lg">
        Guardar cambios ✔
      </button>

    </form>

    <!-- Cancelar -->
    <a href="/seguimiento/{{ user_id }}"
   class="block w-full bg-slate-600 hover:bg-slate-500 py-3 mt-4 rounded-xl font-semibold text-center">
  Cancelar
</a>

  </div>

</body>
</html>
