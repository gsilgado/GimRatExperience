<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objetivo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e293b);}</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center">
  <div class="bg-slate-800/80 p-8 rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-4">Elige tu objetivo 🎯</h2>

    <form action="/objetivo" method="post" class="space-y-3">
      <input type="hidden" name="nombre" value="{{ nombre }}">
      <input type="hidden" name="edad" value="{{ edad }}">
      <input type="hidden" name="sexo" value="{{ sexo }}">
      <input type="hidden" name="peso" value="{{ peso }}">
      <input type="hidden" name="estatura" value="{{ estatura }}">
      <input type="hidden" name="actividad" value="{{ actividad }}">
      <input type="hidden" name="dias_entreno" value="{{ dias_entreno }}">

      <button type="submit" name="objetivo" value="perder_grasa" class="w-full bg-red-600 hover:bg-red-700 p-4 rounded-xl">🔥 Perder grasa</button>
      <button type="submit" name="objetivo" value="ganar_musculo" class="w-full bg-yellow-500 hover:bg-yellow-600 p-4 rounded-xl text-slate-900">💪 Ganar músculo</button>
      <button type="submit" name="objetivo" value="recomposicion" class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl">⚖️ Recomposición</button>
      <button type="submit" name="objetivo" value="salud_general" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl">🧘 Salud general</button>
    </form>
  </div>
</body>
</html>
