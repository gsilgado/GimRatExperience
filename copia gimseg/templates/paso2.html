<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datos personales</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e293b);}</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">
  <div class="bg-slate-800/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
    <h2 class="text-3xl font-bold text-center mb-3">Casi terminamos 🎯</h2>
    <p class="text-slate-300 text-center mb-6">Hola <b>{{ nombre }}</b>, rellena estos datos.</p>

    <form action="/registrar" method="post" class="space-y-4">
      <input type="hidden" name="nombre" value="{{ nombre }}">

      <div>
        <label class="block font-semibold mb-1">🗓️ Edad</label>
        <input type="number" name="edad" required class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
      </div>

      <div>
        <label class="block font-semibold mb-1">⚧️ Sexo</label>
        <select name="sexo" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
          <option value="hombre">Hombre</option>
          <option value="mujer">Mujer</option>
        </select>
      </div>

      <div>
        <label class="block font-semibold mb-1">⚖️ Peso (kg)</label>
        <input type="number" step="0.1" name="peso" required class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
      </div>

      <div>
        <label class="block font-semibold mb-1">📏 Estatura (cm)</label>
        <input type="number" name="estatura" required class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
      </div>

      <div>
        <label class="block font-semibold mb-1">🏃 Actividad diaria</label>
        <select name="actividad" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
          <option value="sedentario">Sedentario</option>
          <option value="ligero">Ligero</option>
          <option value="moderado" selected>Moderado</option>
          <option value="activo">Activo</option>
          <option value="muy_activo">Muy activo</option>
        </select>
      </div>

      <div>
        <label class="block font-semibold mb-1">🏋️ Días de entrenamiento por semana</label>
        <select name="dias_entreno" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-500">
          <option value="0">0 días</option>
          <option value="1">1 día</option>
          <option value="2">2 días</option>
          <option value="3">3 días</option>
          <option value="4">4 días</option>
          <option value="5">5 días</option>
          <option value="6">6 días</option>
          <option value="7">7 días</option>
        </select>
      </div>

      <button class="w-full bg-green-600 hover:bg-green-700 py-3 mt-2 rounded-xl font-semibold">Continuar →</button>
    </form>
  </div>
</body>
</html>
