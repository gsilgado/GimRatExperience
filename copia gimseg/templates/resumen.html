<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resumen</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e293b);}</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center">
  <div class="bg-slate-800/80 backdrop-blur-lg p-8 rounded-2xl w-full max-w-md border border-slate-700">
    <h2 class="text-3xl font-bold text-center mb-3">Revisa tu información ✔</h2>

    <div class="bg-slate-900/70 p-4 rounded-xl border border-slate-700 mb-5 space-y-1">
      <p><b>Nombre:</b> {{ data.nombre }}</p>
      <p><b>Edad:</b> {{ data.edad }}</p>
      <p><b>Sexo:</b> {{ data.sexo }}</p>
      <p><b>Peso:</b> {{ data.peso }} kg</p>
      <p><b>Estatura:</b> {{ data.estatura }} cm</p>
      <p><b>Actividad:</b> {{ data.actividad }}</p>
      <p><b>Días de entreno:</b> {{ data.dias_entreno }}</p>
      <p><b>Objetivo:</b> {{ data.objetivo }}</p>
      <p><b>Experiencia:</b> {{ data.experiencia }}</p>
    </div>

    <form action="/finalizar" method="post">
      <input type="hidden" name="nombre" value="{{ data.nombre }}">
      <input type="hidden" name="edad" value="{{ data.edad }}">
      <input type="hidden" name="sexo" value="{{ data.sexo }}">
      <input type="hidden" name="peso" value="{{ data.peso }}">
      <input type="hidden" name="estatura" value="{{ data.estatura }}">
      <input type="hidden" name="actividad" value="{{ data.actividad }}">
      <input type="hidden" name="dias_entreno" value="{{ data.dias_entreno }}">
      <input type="hidden" name="objetivo" value="{{ data.objetivo }}">
      <input type="hidden" name="experiencia" value="{{ data.experiencia }}">

      <button class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold">Guardar y crear plan ✔</button>
    </form>
  </div>
</body>
</html>
