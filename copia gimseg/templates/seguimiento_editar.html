<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar medición</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e293b); }
  </style>
</head>

<body class="p-6 text-white font-sans">

  <div class="max-w-xl mx-auto">

    <h1 class="text-3xl font-bold mb-4">✏️ Editar medición del {{ m.fecha }}</h1>

     <FORM action="/seguimiento/editar" method="post" class="space-y-4">

  <input type="hidden" name="user_id" value="{{ user_id }}">
  <input type="hidden" name="fecha_original" value="{{ m.fecha }}">

  <label class="block text-sm text-slate-300 mb-1">Fecha</label>
  <input type="date" name="fecha" value="{{ m.fecha }}"
         class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white mb-3" required>

  <label class="block text-sm text-slate-300 mb-1">Peso (kg)</label>
  <input type="number" step="0.1" name="peso" value="{{ m.peso }}"
         class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white mb-3">

  <div class="grid grid-cols-2 gap-4">

    <div>
      <label class="text-sm">Pecho (cm)</label>
      <input type="number" step="0.1" name="pecho" value="{{ m.pecho }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

    <div>
      <label class="text-sm">Cintura (cm)</label>
      <input type="number" step="0.1" name="cintura" value="{{ m.cintura }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

    <div>
      <label class="text-sm">Abdomen (cm)</label>
      <input type="number" step="0.1" name="abdomen" value="{{ m.abdomen }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

    <div>
      <label class="text-sm">Cadera (cm)</label>
      <input type="number" step="0.1" name="cadera" value="{{ m.cadera }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

    <div>
      <label class="text-sm">Brazo (cm)</label>
      <input type="number" step="0.1" name="brazo" value="{{ m.brazo }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

    <div>
      <label class="text-sm">Pierna (cm)</label>
      <input type="number" step="0.1" name="pierna" value="{{ m.pierna }}"
             class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
    </div>

  </div>

  <button class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-semibold shadow-lg active:scale-95">
    Guardar cambios ✔
  </button>

</FORM>

<a href="/seguimiento/{{ user_id }}"
   class="block w-full mt-6 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-semibold text-center">
  ← Cancelar
</a>
  </div>

</body>
</html>
