<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar usuario</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg,#0f172a,#1e293b);
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn .45s ease-out; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

  <div class="bg-slate-800/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 animate-fadeIn">

    <h2 class="text-3xl font-bold text-center mb-4">Editar usuario ✏️</h2>
    <p class="text-slate-300 text-center mb-6">
      Modifica tu información. El plan ON/OFF se recalculará automáticamente.
    </p>

    <!-- FORMULARIO -->
    <form action="/usuario/editar" method="post" class="space-y-4">

      <input type="hidden" name="user_id" value="{{ u.id }}">

      <!-- Nombre -->
      <div>
        <label class="block text-sm font-semibold mb-1">Nombre</label>
        <input type="text" name="nombre" value="{{ u.nombre }}" required
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
      </div>

      <!-- Edad -->
      <div>
        <label class="block text-sm font-semibold mb-1">Edad</label>
        <input type="number" name="edad" value="{{ u.edad }}" min="10" max="100" required
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
      </div>

      <!-- Sexo -->
      <div>
        <label class="block text-sm font-semibold mb-1">Sexo</label>
        <select name="sexo" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="hombre" {% if u.sexo == "hombre" %}selected{% endif %}>Hombre</option>
          <option value="mujer"  {% if u.sexo == "mujer"  %}selected{% endif %}>Mujer</option>
        </select>
      </div>

      <!-- Peso -->
      <div>
        <label class="block text-sm font-semibold mb-1">Peso (kg)</label>
        <input type="number" step="0.1" name="peso" value="{{ u.peso }}" min="20" max="400" required
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
      </div>

      <!-- Estatura -->
      <div>
        <label class="block text-sm font-semibold mb-1">Estatura (cm)</label>
        <input type="number" name="estatura" value="{{ u.estatura }}" min="120" max="250" required
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
      </div>

      <!-- Actividad -->
      <div>
        <label class="block text-sm font-semibold mb-1">Actividad diaria</label>
        <select name="actividad" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="sedentario" {% if u.actividad == "sedentario" %}selected{% endif %}>Sedentario</option>
          <option value="ligero" {% if u.actividad == "ligero" %}selected{% endif %}>Ligero</option>
          <option value="moderado" {% if u.actividad == "moderado" %}selected{% endif %}>Moderado</option>
          <option value="activo" {% if u.actividad == "activo" %}selected{% endif %}>Activo</option>
          <option value="muy_activo" {% if u.actividad == "muy_activo" %}selected{% endif %}>Muy activo</option>
        </select>
      </div>

      <!-- DÍAS DE ENTRENO -->
      <div>
        <label class="block text-sm font-semibold mb-1">Días de entrenamiento / semana</label>
        <select name="dias_entreno" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="0" {% if u.dias_entreno == 0 %}selected{% endif %}>0</option>
          <option value="1" {% if u.dias_entreno == 1 %}selected{% endif %}>1</option>
          <option value="2" {% if u.dias_entreno == 2 %}selected{% endif %}>2</option>
          <option value="3" {% if u.dias_entreno == 3 %}selected{% endif %}>3</option>
          <option value="4" {% if u.dias_entreno == 4 %}selected{% endif %}>4</option>
          <option value="5" {% if u.dias_entreno == 5 %}selected{% endif %}>5</option>
          <option value="6" {% if u.dias_entreno == 6 %}selected{% endif %}>6</option>
          <option value="7" {% if u.dias_entreno == 7 %}selected{% endif %}>7</option>
        </select>
      </div>

      <!-- INTENSIDAD BASE (NUEVO CAMPO) -->
      <div>
        <label class="block text-sm font-semibold mb-1">Intensidad base (semana)</label>
        <select name="intensidad_base"
                class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="ligera"   {% if u.intensidad_base == "ligera"   %}selected{% endif %}>Ligera (~150 kcal/sesión)</option>
          <option value="moderada" {% if u.intensidad_base == "moderada" %}selected{% endif %}>Moderada (~250 kcal/sesión)</option>
          <option value="intensa"  {% if u.intensidad_base == "intensa"  %}selected{% endif %}>Intensa (~400 kcal/sesión)</option>
        </select>
      </div>

      <!-- Objetivo -->
      <div>
        <label class="block text-sm font-semibold mb-1">Objetivo</label>
        <select name="objetivo" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="perder_grasa"   {% if u.objetivo == "perder_grasa"   %}selected{% endif %}>Perder grasa</option>
          <option value="ganar_musculo"  {% if u.objetivo == "ganar_musculo"  %}selected{% endif %}>Ganar músculo</option>
          <option value="recomposicion"  {% if u.objetivo == "recomposicion"  %}selected{% endif %}>Recomposición</option>
          <option value="salud_general"  {% if u.objetivo == "salud_general"  %}selected{% endif %}>Mejorar salud</option>
        </select>
      </div>

      <!-- Experiencia -->
      <div>
        <label class="block text-sm font-semibold mb-1">Experiencia</label>
        <select name="experiencia" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-white">
          <option value="principiante" {% if u.experiencia == "principiante" %}selected{% endif %}>Principiante</option>
          <option value="intermedio"   {% if u.experiencia == "intermedio"   %}selected{% endif %}>Intermedio</option>
          <option value="avanzado"     {% if u.experiencia == "avanzado"     %}selected{% endif %}>Avanzado</option>
        </select>
      </div>

      <!-- GUARDAR -->
      <button class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold">
        Guardar cambios ✔
      </button>

    </form>

    <!-- VOLVER -->
    <div class="mt-4">
      <a href="/dashboard/{{ u.id }}"
         class="block w-full text-center bg-slate-600 hover:bg-slate-500 py-3 rounded-xl">
        ← Volver al Dashboard
      </a>
    </div>

  </div>

</body>
</html>
