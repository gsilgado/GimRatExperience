<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nivel experiencia</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e293b);}</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center">
  <div class="bg-slate-800/80 p-8 rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-4">Tu nivel 💪</h1>

    <form action="/experiencia" method="post" class="space-y-3">
      <input type="hidden" name="nombre" value="{{ data.nombre }}">
      <input type="hidden" name="edad" value="{{ data.edad }}">
      <input type="hidden" name="sexo" value="{{ data.sexo }}">
      <input type="hidden" name="peso" value="{{ data.peso }}">
      <input type="hidden" name="estatura" value="{{ data.estatura }}">
      <input type="hidden" name="actividad" value="{{ data.actividad }}">
      <input type="hidden" name="dias_entreno" value="{{ data.dias_entreno }}">
      <input type="hidden" name="objetivo" value="{{ data.objetivo }}">

      <button type="submit" name="experiencia" value="principiante" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl">🟢 Principiante</button>
      <button type="submit" name="experiencia" value="intermedio" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl">🟡 Intermedio</button>
      <button type="submit" name="experiencia" value="avanzado" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl">🔴 Avanzado</button>
    </form>
  </div>
</body>
</html>
