<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Usuario</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
    /* Animación de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn .45s ease-out; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen">

  <div class="bg-slate-800/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md animate-fadeIn border border-slate-700">

    <h2 class="text-3xl font-bold text-white text-center mb-4">👤 Registrar Usuario</h2>
    <p class="text-slate-300 text-center mb-6">Introduce tu nombre para comenzar.</p>

    <!-- Formulario -->
    <form action="/paso2" method="post" class="space-y-4">

      <div>
        <label class="block text-slate-200 font-semibold mb-1">Nombre del usuario</label>
        <input 
          type="text" 
          name="nombre" 
          placeholder="Ej: Gabriel"
          class="w-full p-3 rounded-lg bg-slate-700 border border-slate-500 text-white
                 placeholder-slate-400 focus:outline-none focus:ring focus:ring-blue-500/40 focus:border-blue-500"
          required
        />
      </div>

      <button
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold
               transition active:scale-95 shadow-lg shadow-blue-900/40"
      >
        Continuar →
      </button>

    </form>
  </div>

</body>
</html>
